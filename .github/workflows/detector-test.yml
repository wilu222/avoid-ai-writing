name: detector

on:
  push:
    paths:
      - "detector/**"
      - "package.json"
      - ".github/workflows/detector-test.yml"
  pull_request:
    paths:
      - "detector/**"
      - "package.json"
      - ".github/workflows/detector-test.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm test
